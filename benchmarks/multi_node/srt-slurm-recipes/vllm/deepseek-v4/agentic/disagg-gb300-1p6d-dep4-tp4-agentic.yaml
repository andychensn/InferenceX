name: "svf-vllm-disagg-gb300-1p6d-dep4-tp4-agentic"

# Agentic-coding variant of vllm/deepseek-v4/8k1k/disagg-gb300-1p6d-dep4-tp4.yaml.
# Topology is identical (1 prefill DEP=4 + 6 decode TP=4, 28 GPUs across 7
# GB300 nodes + 1 dedicated NATS/etcd infra node) so we can compare against
# the fixed-seq-len 1p6d baseline at the same concurrency point (192).
#
# Divergence vs the 8k1k sibling:
#   - benchmark.type:        sa-bench -> custom (hands off to agentic_srt.sh)
#   - max-model-len:         removed (let vLLM derive from model config; agentic
#                              trajectories blow past any small explicit cap)
#   - no-enable-prefix-caching: dropped (prefix caching MUST be on for
#                              trajectory reuse — entire point of agentic)
# Note: --enable-auto-tool-choice / --tool-call-parser / --reasoning-parser
# are NOT set on the worker. The dynamo-vllm worker entrypoint doesn't
# accept them (different arg parser than `vllm serve`). In disagg, chat
# parsing happens at the dynamo frontend, not at the worker.

model:
  path: "deepseek-v4-pro"
  container: "vllm/vllm-openai:v0.21.0-ubuntu2404"
  precision: "fp4"

dynamo:
  install: true
  wheel: "1.2.0.dev20260426"

setup_script: vllm-container-deps.sh

slurm:
  time_limit: "8:00:00"

health_check:
  max_attempts: 1440
  interval_seconds: 10

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  decode_nodes: 6
  prefill_workers: 1
  decode_workers: 6
  gpus_per_prefill: 4
  gpus_per_decode: 4

infra:
  etcd_nats_dedicated_node: true

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: vllm
  connector: null
  prefill_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    TORCH_SYMMMEM: "NVSHMEM"
  decode_environment:
    TILELANG_CLEANUP_TEMP_FILES: "1"
    VLLM_USE_NCCL_SYMM_MEM: "1"
    NCCL_CUMEM_ENABLE: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_NVLS_ENABLE: "1"
    TORCH_SYMMMEM: "NVSHMEM"

  vllm_config:
    prefill:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 1
      pipeline-parallel-size: 1
      data-parallel-size: 4
      data-parallel-rpc-port: 13345
      enable-expert-parallel: true
      attention-config: '{"use_fp4_indexer_cache": true}'
      moe-backend: "deep_gemm_mega_moe"
      enforce-eager: true
      max-num-seqs: 256
      max-num-batched-tokens: 16384
      trust-remote-code: true
      no-enable-flashinfer-autotune: true
      no-async-scheduling: true
      block-size: 256
      gpu-memory-utilization: 0.9
      enable-ep-weight-filter: true
      no-disable-hybrid-kv-cache-manager: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4
    decode:
      kv-transfer-config: '{"kv_connector": "NixlConnector", "kv_role": "kv_both"}'
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      kv-cache-dtype: "fp8"
      tensor-parallel-size: 4
      pipeline-parallel-size: 1
      max-num-seqs: 512
      max-cudagraph-capture-size: 512
      max-num-batched-tokens: 512
      trust-remote-code: true
      block-size: 256
      compilation-config: '{"cudagraph_mode":"FULL_DECODE_ONLY","mode":0}'
      gpu-memory-utilization: 0.9
      stream-interval: 50
      no-disable-hybrid-kv-cache-manager: true
      enable-ep-weight-filter: true
      all2all-backend: "flashinfer_nvlink_one_sided"
      no-enable-flashinfer-autotune: true
      enable-sleep-mode: true
      tokenizer-mode: deepseek_v4

# Pass --mem=0 to every container worker srun. Without this, on clusters
# with positive DefMemPerCPU (e.g. CW gb300: DefMemPerCPU=4096), the
# per-task default is cpus_per_task × 4 GB = 4 GB per worker — wildly
# insufficient for a vLLM worker mmap'ing multi-GB model weights. cgroup
# OOM-kills the worker mid model load. --mem=0 = "all available node
# memory" (~868 GB on CW gb300). See docs/config-reference.md#srun_options.
srun_options:
  mem: "0"

benchmark:
  type: custom
  command: bash /infmax-workspace/benchmarks/multi_node/agentic_srt.sh
  env:
    INFMAX_CONTAINER_WORKSPACE: /infmax-workspace
    RESULT_DIR: /logs/agentic
    PORT: "8000"
    IS_MULTINODE: "true"
