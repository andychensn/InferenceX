name: "dsv4-pro-gb300-disagg-1k1k-1p6d-dep4-tp4"
# DeepSeek-V4-Pro 1k/1k disagg on GB300 — 1P + 6D, DEP4 prefill / TP4 decode.
#
# Single-config recipe derived from disagg-low-latency-dep4.yaml zip override
# variant [3] (decode_nodes=6). Concurrencies pruned to the Pareto-frontier
# points from the original sweep

frontend:
  type: sglang
  enable_multiple_frontends: false
  args:
    policy: "cache_aware"

model:
  path: "dsv4-pro"
  container: "dsv4-grace-blackwell"
  precision: "mxfp4"

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  prefill_nodes: 1
  prefill_workers: 1
  decode_nodes: 6
  decode_workers: 6

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    SGLANG_ENABLE_THINKING: "1"
    SGLANG_REASONING_EFFORT: "max"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"

    SGLANG_OPT_SWA_EVICT_DROP_PAGE_MARGIN: "1"
    SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2: "1"
    SGLANG_OPT_USE_FAST_MASK_EP: "1"
    SGLANG_OPT_USE_DEEPGEMM_MEGA_MOE: "1"
    SGLANG_OPT_FIX_HASH_MEGA_MOE: "1"
    SGLANG_OPT_DEEPGEMM_MEGA_MOE_NUM_MAX_TOKENS_PER_RANK: "9216"
    SGLANG_OPT_FIX_MEGA_MOE_MEMORY: "1"
    SGLANG_OPT_FIX_NEXTN_MEGA_MOE: "1"
    SGLANG_DEEPEP_NUM_MAX_DISPATCH_TOKENS_PER_RANK: "0"

    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    MC_FORCE_MNNVL: "1"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_OPT_SWA_RELEASE_LEAF_LOCK_AFTER_WINDOW: "1"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    SGLANG_ENABLE_THINKING: "1"
    SGLANG_REASONING_EFFORT: "max"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    MC_FORCE_MNNVL: "1"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_OPT_SWA_RELEASE_LEAF_LOCK_AFTER_WINDOW: "1"
    # SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2 intentionally NOT set: CAR_V2
    # is single-node only and corrupts results in 2-node decode setups.

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true
      disable-radix-cache: true

      disaggregation-mode: "prefill"
      disaggregation-transfer-backend: mooncake

      tensor-parallel-size: 4
      data-parallel-size: 4
      expert-parallel-size: 4

      enable-dp-attention: true
      enable-dp-lm-head: true

      moe-a2a-backend: "deepep"
      deepep-config: '{"normal_dispatch":{"num_sms":96},"normal_combine":{"num_sms":96}}'

      mem-fraction-static: 0.90
      max-running-requests: 512
      cuda-graph-max-bs: 512
      chunked-prefill-size: 4096

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true
      disable-radix-cache: true

      disaggregation-mode: "decode"
      disaggregation-transfer-backend: mooncake

      tensor-parallel-size: 4
      data-parallel-size:   1
      expert-parallel-size: 1

      moe-runner-backend: "flashinfer_mxfp4"
      disable-flashinfer-autotune: true

      mem-fraction-static: 0.9
      max-running-requests: 128
      cuda-graph-max-bs:    128
      swa-full-tokens-ratio: 0.1
      context-length: 4096

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  random_range_ratio: 0.8
  concurrencies: "32x64"
  req_rate: "inf"
  use_chat_template: false
