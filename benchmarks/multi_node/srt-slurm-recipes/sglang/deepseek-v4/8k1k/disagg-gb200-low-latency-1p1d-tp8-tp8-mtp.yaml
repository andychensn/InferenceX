name: "dsv4-pro-gb200-disagg-8k1k-low-latency-1p1d-tp8-tp8-mtp"

frontend:
  type: dynamo
  enable_multiple_frontends: true
  num_additional_frontends: 8

dynamo:
  hash: "34d55a596fb8d3d44daefe425ec1e303131f4d2c"
  install: true

# 100-min readiness wall (default 30 min) so the per-worker dynamo
# source build has room to finish before health-poll gives up.
health_check:
  max_attempts: 600
  interval_seconds: 10

model:
  path: "deepseek-v4-pro"
  container: "lmsysorg/sglang:nightly-dev-cu13-20260510-2473659e"
  precision: "mxfp4"

sbatch_directives:
  cpus-per-task: "144"
  mem: "0"

resources:
  gpu_type: "gb200"
  gpus_per_node: 4
  prefill_nodes: 2
  prefill_workers: 1
  gpus_per_prefill: 8
  decode_nodes: 2
  decode_workers: 1
  gpus_per_decode: 8

backend:
  type: sglang

  prefill_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_RADIX_DISABLE_REUSE: "1"
    SGLANG_JIT_DEEPGEMM_FAST_WARMUP: "1"
    SGLANG_DEFAULT_THINKING: "1"
    SGLANG_DSV4_REASONING_EFFORT: "max"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    MC_FORCE_MNNVL: "1"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_OPT_SWA_RELEASE_LEAF_LOCK_AFTER_WINDOW: "1"

  decode_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_RADIX_DISABLE_REUSE: "1"
    SGLANG_JIT_DEEPGEMM_FAST_WARMUP: "1"
    SGLANG_DEFAULT_THINKING: "1"
    SGLANG_DSV4_REASONING_EFFORT: "max"
    SGLANG_OPT_SWA_SPLIT_LEAF_ON_INSERT: "1"
    SGLANG_OPT_USE_JIT_NORM: "1"
    SGLANG_OPT_USE_JIT_INDEXER_METADATA: "1"
    SGLANG_OPT_USE_TOPK_V2: "1"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    MC_FORCE_MNNVL: "1"
    SGLANG_DISAGGREGATION_BOOTSTRAP_TIMEOUT: "100000"
    SGLANG_DISAGGREGATION_WAITING_TIMEOUT: "100000"
    SGLANG_OPT_SWA_RELEASE_LEAF_LOCK_AFTER_WINDOW: "1"
    # SGLANG_OPT_USE_CUSTOM_ALL_REDUCE_V2 intentionally NOT set: CAR_V2
    # is single-node only and corrupts results in 2-node decode setups.

  sglang_config:
    prefill:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true
      tool-call-parser: deepseekv4  # gates dsv4 chat-encoding spec.

      disaggregation-mode: "prefill"
      # Pinned port: srt-slurm sa-submission-q2-2026 omits the
      # --disaggregation-bootstrap-port arg, so each prefill node picks
      # its own random port and the follower's register_to_bootstrap call
      # hits a non-existent port on the leader. Pinning a fixed port
      # forces both nodes to agree on it.
      disaggregation-bootstrap-port: 30001
      disaggregation-transfer-backend: nixl

      tensor-parallel-size: 8
      data-parallel-size: 1
      expert-parallel-size: 1

      moe-runner-backend: "flashinfer_mxfp4"
      disable-flashinfer-autotune: true

      mem-fraction-static: 0.9
      max-running-requests: 8
      cuda-graph-max-bs: 8
      chunked-prefill-size: 32768

    decode:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true
      tool-call-parser: deepseekv4  # gates dsv4 chat-encoding spec.

      disaggregation-mode: "decode"
      disaggregation-transfer-backend: nixl

      tensor-parallel-size: 8
      data-parallel-size: 1
      expert-parallel-size: 1

      moe-runner-backend: "flashinfer_mxfp4"
      disable-flashinfer-autotune: true

      speculative-algo: "EAGLE"
      speculative-num-steps: 3
      speculative-eagle-topk: 1
      speculative-num-draft-tokens: 4

      mem-fraction-static: 0.9
      max-running-requests: 8
      cuda-graph-max-bs: 8
      swa-full-tokens-ratio: 0.1
      context-length: 16384

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 256
  random_range_ratio: 1.0
  concurrencies: "512"
  req_rate: "inf"
  use_chat_template: true
  custom_tokenizer: "sa_bench_tokenizers.sglang_deepseek_v4.SGLangDeepseekV4Tokenizer"
