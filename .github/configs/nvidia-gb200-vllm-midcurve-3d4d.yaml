dsv4-fp4-gb200-dynamo-vllm:
  image: vllm/vllm-openai:v0.20.0-ubuntu2404
  model: deepseek-ai/DeepSeek-V4-Pro
  model-prefix: dsv4
  runner: gb200
  precision: fp4
  framework: dynamo-vllm
  multinode: true
  disagg: true
  scenarios:
    fixed-seq-len:
    - isl: 8192
      osl: 256
      search-space:
      - conc-list: [4096, 8192]
        spec-decoding: offline
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/8k1k/disagg-gb200-mid-curve-megamoe-3d.yaml"
        decode:
          num-worker: 3
          tp: 8
          ep: 8
          dp-attn: true
      - conc-list: [4096, 8192]
        spec-decoding: offline
        prefill:
          num-worker: 1
          tp: 8
          ep: 8
          dp-attn: true
          additional-settings:
          - "CONFIG_FILE=recipes/vllm/deepseek-v4/8k1k/disagg-gb200-mid-curve-megamoe-4d.yaml"
        decode:
          num-worker: 4
          tp: 8
          ep: 8
          dp-attn: true
